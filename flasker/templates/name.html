{% extends 'base.html' %}

{% block content %}
    <div class="container">
        {% if name %}
            <h1>Hello {{ name }}!</h1>
        {% else %}
        <h1>What's your name?</h1>
        <form method='POST'>
            {{ form.hidden_tag() }}
            {{ form.name.label }}
            {{ form.name }}
            {{ form.submit() }}
        </form>
        {% endif %}
    </div>
{% endblock %}
